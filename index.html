<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特別制作管理 — ガントチャート</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;color:#1a1a1a;background:#f5f4ef;font-size:14px;}
button{font-family:inherit;font-size:13px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.25);border-radius:8px;padding:5px 12px;background:#fff;color:#1a1a1a;transition:background 0.1s;}
button:hover{background:#f0f0eb;}
button:active{transform:scale(0.98);}
input,select{font-family:inherit;font-size:13px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.hdr{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.15);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10;}
.hdr-title{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;}
.hdr-title i{font-size:20px;color:#666;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-month{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:500;background:#eeede8;border-radius:8px;padding:4px 8px;border:0.5px solid rgba(0,0,0,0.1);}
.nav-btn{background:none;border:none;cursor:pointer;color:#666;padding:2px 4px;border-radius:4px;line-height:1;font-size:16px;display:flex;}
.nav-btn:hover{background:#fff;}
#addBtn{background:#1a1a1a;color:#fff;border-color:#1a1a1a;display:flex;align-items:center;gap:4px;}
#addBtn:hover{background:#333;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 16px;flex-shrink:0;}
.card{background:#eeede8;border-radius:8px;padding:8px 12px;text-align:center;}
.card-label{font-size:11px;color:#666;margin-bottom:2px;}
.card-value{font-size:22px;font-weight:500;}
.card-value.blue{color:#185FA5;}
.card-value.green{color:#3B6D11;}
.card-value.red{color:#A32D2D;}
.gantt-wrap{flex:1;overflow:hidden;display:flex;background:#fff;border-top:0.5px solid rgba(0,0,0,0.12);}
.gantt-left{width:360px;flex-shrink:0;overflow-y:auto;overflow-x:hidden;border-right:0.5px solid rgba(0,0,0,0.12);background:#fff;z-index:2;}
.gantt-right{flex:1;overflow:auto;position:relative;}
.t-head{position:sticky;top:0;background:#eeede8;z-index:3;border-bottom:0.5px solid rgba(0,0,0,0.12);}
.t-head-row,.t-row{display:grid;grid-template-columns:1fr 72px 72px 60px 32px;align-items:center;}
.t-head-row{height:52px;}
.t-cell{padding:5px 8px;font-size:11px;color:#666;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-row{height:40px;border-bottom:0.5px solid rgba(0,0,0,0.08);cursor:pointer;transition:background 0.1s;}
.t-row:hover{background:#f8f8f4;}
.t-row .t-cell{font-size:12px;color:#1a1a1a;}
.task-name{font-weight:500;font-size:12px;}
.task-num{font-size:10px;color:#888;margin-top:1px;}
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;white-space:nowrap;}
.badge-未着手{background:#D3D1C7;color:#444441;}
.badge-進行中{background:#B5D4F4;color:#0C447C;}
.badge-完了{background:#C0DD97;color:#27500A;}
.badge-遅延{background:#F7C1C1;color:#791F1F;}
.badge-保留{background:#FAC775;color:#633806;}
.prog-wrap{width:100%;height:6px;background:rgba(0,0,0,0.1);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:#378ADD;transition:width 0.3s;}
.timeline-head{position:sticky;top:0;background:#eeede8;z-index:2;border-bottom:0.5px solid rgba(0,0,0,0.12);}
.month-row{display:flex;height:26px;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.month-label{padding:0 8px;font-size:11px;font-weight:500;color:#555;display:flex;align-items:center;border-right:0.5px solid rgba(0,0,0,0.08);white-space:nowrap;flex-shrink:0;}
.day-row{display:flex;height:26px;}
.day-cell{font-size:9px;color:#999;display:flex;align-items:center;justify-content:center;border-right:0.5px solid rgba(0,0,0,0.06);flex-shrink:0;}
.day-cell.today{background:rgba(55,138,221,0.14);color:#185FA5;font-weight:500;}
.day-cell.weekend{background:rgba(0,0,0,0.025);color:#bbb;}
.bars-area{position:relative;}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(55,138,221,0.45);z-index:1;pointer-events:none;}
.gantt-bar{position:absolute;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;z-index:1;}
.gantt-bar:hover{filter:brightness(0.9);}
.bar-未着手{background:#B4B2A9;color:#2C2C2A;}
.bar-進行中{background:#378ADD;color:#fff;}
.bar-完了{background:#639922;color:#fff;}
.bar-遅延{background:#E24B4A;color:#fff;}
.bar-保留{background:#EF9F27;color:#412402;}
.grid-line{position:absolute;top:0;bottom:0;width:0.5px;background:rgba(0,0,0,0.06);pointer-events:none;}
.empty-state{text-align:center;padding:48px 20px;color:#888;font-size:13px;}
.empty-state i{font-size:36px;display:block;margin-bottom:8px;opacity:0.3;}
.row-del{background:none;border:none;cursor:pointer;color:#bbb;padding:4px;border-radius:4px;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;}
.row-del:hover{color:#E24B4A;background:#FCEBEB;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.38);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal-bg.hidden{display:none;}
.modal-box{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.15);width:460px;max-width:95vw;padding:20px;}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-field.full{grid-column:1/-1;}
.form-label{font-size:11px;color:#666;font-weight:500;}
.form-field input,.form-field select{height:34px;border:0.5px solid rgba(0,0,0,0.28);border-radius:8px;padding:0 10px;font-size:13px;background:#fff;color:#1a1a1a;width:100%;outline:none;}
.form-field input:focus,.form-field select:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,0.18);}
.range-wrap{display:flex;align-items:center;gap:8px;}
.range-wrap input[type=range]{flex:1;}
.range-val{font-size:12px;font-weight:500;min-width:36px;text-align:right;color:#555;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:0.5px solid rgba(0,0,0,0.1);}
#saveBtn{background:#1a1a1a;color:#fff;border-color:#1a1a1a;display:flex;align-items:center;gap:4px;}
#saveBtn:hover{background:#333;}
.tooltip{position:fixed;background:#fff;border:0.5px solid rgba(0,0,0,0.18);border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:200;max-width:240px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.tooltip.hidden{display:none;}
.tt-title{font-weight:500;margin-bottom:4px;}
.tt-row{color:#666;margin-top:2px;font-size:11px;}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-title">
      <i class="ti ti-layout-kanban" aria-hidden="true"></i>
      特別制作管理
    </div>
    <div class="hdr-right">
      <div class="nav-month">
        <button class="nav-btn" id="prevM" title="前の月"><i class="ti ti-chevron-left"></i></button>
        <span id="monthLbl" style="min-width:72px;text-align:center;"></span>
        <button class="nav-btn" id="nextM" title="次の月"><i class="ti ti-chevron-right"></i></button>
      </div>
      <button id="todayBtn">今日</button>
      <button id="addBtn"><i class="ti ti-plus" aria-hidden="true"></i> 案件追加</button>
    </div>
  </div>

  <div class="summary">
    <div class="card"><div class="card-label">総案件数</div><div class="card-value" id="s-all">0</div></div>
    <div class="card"><div class="card-label">進行中</div><div class="card-value blue" id="s-act">0</div></div>
    <div class="card"><div class="card-label">完了済み</div><div class="card-value green" id="s-don">0</div></div>
    <div class="card"><div class="card-label">納期超過</div><div class="card-value red" id="s-ove">0</div></div>
  </div>

  <div class="gantt-wrap">
    <div class="gantt-left" id="gLeft">
      <div class="t-head">
        <div class="t-head-row">
          <div class="t-cell">案件名 / 品番</div>
          <div class="t-cell">担当者</div>
          <div class="t-cell">ステータス</div>
          <div class="t-cell">進捗</div>
          <div class="t-cell"></div>
        </div>
      </div>
      <div id="taskRows"></div>
    </div>
    <div class="gantt-right" id="gRight">
      <div class="timeline-head" id="tlHead"></div>
      <div class="bars-area" id="barsArea"></div>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal">
  <div class="modal-box">
    <div class="modal-title"><i class="ti ti-edit" aria-hidden="true"></i><span id="mTitle">案件を追加</span></div>
    <div class="form-grid">
      <div class="form-field full"><div class="form-label">案件名 *</div><input type="text" id="fName" placeholder="例：特注フレーム製作"></div>
      <div class="form-field"><div class="form-label">品番</div><input type="text" id="fNum" placeholder="例：SP-001"></div>
      <div class="form-field"><div class="form-label">担当者</div><input type="text" id="fOwner" placeholder="例：田中"></div>
      <div class="form-field"><div class="form-label">開始日 *</div><input type="date" id="fStart"></div>
      <div class="form-field"><div class="form-label">納期 *</div><input type="date" id="fEnd"></div>
      <div class="form-field"><div class="form-label">ステータス</div>
        <select id="fStatus">
          <option value="未着手">未着手</option>
          <option value="進行中">進行中</option>
          <option value="完了">完了</option>
          <option value="遅延">遅延</option>
          <option value="保留">保留</option>
        </select>
      </div>
      <div class="form-field full"><div class="form-label">進捗率</div>
        <div class="range-wrap">
          <input type="range" id="fProg" min="0" max="100" step="5" value="0">
          <span class="range-val" id="fProgVal">0%</span>
        </div>
      </div>
      <div class="form-field full"><div class="form-label">メモ</div><input type="text" id="fNote" placeholder="備考など"></div>
    </div>
    <div class="modal-footer">
      <button id="cancelBtn">キャンセル</button>
      <button id="saveBtn"><i class="ti ti-check" aria-hidden="true"></i> 保存</button>
    </div>
  </div>
</div>

<div class="tooltip hidden" id="tip">
  <div class="tt-title" id="ttName"></div>
  <div class="tt-row" id="ttNum"></div>
  <div class="tt-row" id="ttDates"></div>
  <div class="tt-row" id="ttOwner"></div>
  <div class="tt-row" id="ttProg"></div>
  <div class="tt-row" id="ttNote"></div>
</div>

<script>
const DAY_W=28,ROW_H=40,STORE_KEY='gantt_tokubetsu_v1';
let tasks=[],viewStart=new Date(),editId=null,syncing=false;

function init(){
  const saved=localStorage.getItem(STORE_KEY);
  if(saved){try{tasks=JSON.parse(saved);}catch(e){tasks=[];}}
  else{
    const t=new Date(),fmt=d=>d.toISOString().slice(0,10);
    const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
    tasks=[
      {id:1,name:'特注フレーム製作',num:'SP-001',owner:'田中',start:fmt(add(t,-5)),end:fmt(add(t,20)),status:'進行中',prog:35,note:'材料調達済み'},
      {id:2,name:'カバー板金加工',num:'SP-002',owner:'鈴木',start:fmt(add(t,3)),end:fmt(add(t,30)),status:'未着手',prog:0,note:''},
      {id:3,name:'特殊ネジ調達・組付け',num:'SP-003',owner:'佐藤',start:fmt(add(t,-15)),end:fmt(add(t,5)),status:'遅延',prog:60,note:'仕入れ先要確認'},
      {id:4,name:'ケースアセンブリ',num:'SP-004',owner:'田中',start:fmt(add(t,10)),end:fmt(add(t,50)),status:'未着手',prog:0,note:''},
      {id:5,name:'試作品検査・検収',num:'SP-005',owner:'山本',start:fmt(add(t,-30)),end:fmt(add(t,-3)),status:'完了',prog:100,note:'合格'},
    ];
    save();
  }
  viewStart=new Date();viewStart.setDate(1);
  render();setTimeout(scrollToToday,80);
  document.getElementById('addBtn').onclick=()=>openModal();
  document.getElementById('cancelBtn').onclick=closeModal;
  document.getElementById('saveBtn').onclick=saveTask;
  document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
  document.getElementById('prevM').onclick=()=>{viewStart.setMonth(viewStart.getMonth()-1);render();};
  document.getElementById('nextM').onclick=()=>{viewStart.setMonth(viewStart.getMonth()+1);render();};
  document.getElementById('todayBtn').onclick=()=>{viewStart=new Date();viewStart.setDate(1);render();setTimeout(scrollToToday,80);};
  document.getElementById('fProg').oninput=function(){document.getElementById('fProgVal').textContent=this.value+'%';};
  const L=document.getElementById('gLeft'),R=document.getElementById('gRight');
  L.addEventListener('scroll',()=>{if(syncing)return;syncing=true;R.scrollTop=L.scrollTop;syncing=false;});
  R.addEventListener('scroll',()=>{if(syncing)return;syncing=true;L.scrollTop=R.scrollTop;syncing=false;});
  document.addEventListener('mousemove',e=>{
    const tip=document.getElementById('tip');
    if(!tip.classList.contains('hidden')){tip.style.left=Math.min(e.clientX+14,window.innerWidth-250)+'px';tip.style.top=Math.min(e.clientY+14,window.innerHeight-140)+'px';}
  });
}

function save(){localStorage.setItem(STORE_KEY,JSON.stringify(tasks));}

function render(){
  const y=viewStart.getFullYear(),m=viewStart.getMonth()+1;
  document.getElementById('monthLbl').textContent=y+'年'+m+'月';
  renderSummary();renderList();renderTimeline();
}

function renderSummary(){
  const today=new Date();today.setHours(0,0,0,0);
  let act=0,don=0,ove=0;
  tasks.forEach(t=>{
    if(t.status==='進行中')act++;
    if(t.status==='完了')don++;
    const e=new Date(t.end);e.setHours(0,0,0,0);
    if(t.status!=='完了'&&e<today)ove++;
  });
  document.getElementById('s-all').textContent=tasks.length;
  document.getElementById('s-act').textContent=act;
  document.getElementById('s-don').textContent=don;
  document.getElementById('s-ove').textContent=ove;
}

function renderList(){
  const c=document.getElementById('taskRows');
  if(!tasks.length){c.innerHTML='<div class="empty-state"><i class="ti ti-clipboard-list" aria-hidden="true"></i><br>案件がありません<br>「案件追加」から始めましょう</div>';return;}
  c.innerHTML=tasks.map(t=>`
    <div class="t-row" onclick="openModal(${t.id})">
      <div class="t-cell"><div class="task-name">${esc(t.name)}</div><div class="task-num">${esc(t.num||'—')}</div></div>
      <div class="t-cell" style="font-size:11px;color:#888">${esc(t.owner||'—')}</div>
      <div class="t-cell"><span class="badge badge-${t.status}">${t.status}</span></div>
      <div class="t-cell"><div class="prog-wrap" title="${t.prog}%"><div class="prog-bar" style="width:${t.prog}%"></div></div></div>
      <div class="t-cell"><button class="row-del" onclick="delTask(event,${t.id})" title="削除" aria-label="削除"><i class="ti ti-trash"></i></button></div>
    </div>`).join('');
}

function getDays(){
  const s=new Date(viewStart);s.setDate(1);
  const e=new Date(s);e.setMonth(e.getMonth()+3);
  const days=[],c=new Date(s);
  while(c<e){days.push(new Date(c));c.setDate(c.getDate()+1);}
  return days;
}

function renderTimeline(){
  const days=getDays(),totalW=days.length*DAY_W;
  const today=new Date();today.setHours(0,0,0,0);
  const months={};
  days.forEach(d=>{
    const k=d.getFullYear()+'-'+d.getMonth();
    if(!months[k])months[k]={label:(d.getMonth()+1)+'月',count:0};
    months[k].count++;
  });
  const mRow=Object.values(months).map(m=>`<div class="month-label" style="width:${m.count*DAY_W}px">${m.label}</div>`).join('');
  const dRow=days.map(d=>{
    const isToday=d.getTime()===today.getTime(),dow=d.getDay(),isWe=dow===0||dow===6;
    return `<div class="day-cell ${isToday?'today':isWe?'weekend':''}" style="width:${DAY_W}px">${d.getDate()}</div>`;
  }).join('');
  document.getElementById('tlHead').innerHTML=`<div class="month-row" style="width:${totalW}px">${mRow}</div><div class="day-row" style="width:${totalW}px">${dRow}</div>`;
  const ba=document.getElementById('barsArea');
  ba.style.width=totalW+'px';ba.style.minHeight=(tasks.length*ROW_H)+'px';
  if(!tasks.length){ba.innerHTML='';return;}
  let html='';
  days.forEach((d,i)=>{if(d.getDay()===1)html+=`<div class="grid-line" style="left:${i*DAY_W}px"></div>`;});
  const ti=days.findIndex(d=>d.getTime()===today.getTime());
  if(ti>=0)html+=`<div class="today-line" style="left:${ti*DAY_W+DAY_W/2}px"></div>`;
  tasks.forEach((t,ri)=>{
    const ts=new Date(t.start);ts.setHours(0,0,0,0);
    const te=new Date(t.end);te.setHours(0,0,0,0);
    const vs=days[0];
    const si=Math.round((ts-vs)/86400000),ei=Math.round((te-vs)/86400000)+1;
    if(ei>0&&si<days.length){
      const left=Math.max(0,si)*DAY_W,w=Math.max(DAY_W,(Math.min(ei,days.length)-Math.max(0,si))*DAY_W);
      const lbl=esc(t.name)+(t.prog>0?' '+t.prog+'%':'');
      html+=`<div class="gantt-bar bar-${t.status}" style="left:${left}px;width:${w}px;top:${ri*ROW_H+9}px" onmouseenter="showTip(event,${t.id})" onmouseleave="hideTip()" onclick="openModal(${t.id})">${lbl}</div>`;
    }
    html+=`<div style="position:absolute;left:0;right:0;top:${ri*ROW_H}px;height:${ROW_H}px;border-bottom:0.5px solid rgba(0,0,0,0.06);pointer-events:none"></div>`;
  });
  ba.innerHTML='<div style="position:relative;height:'+(tasks.length*ROW_H)+'px">'+html+'</div>';
}

function scrollToToday(){
  const days=getDays(),today=new Date();today.setHours(0,0,0,0);
  const idx=days.findIndex(d=>d.getTime()===today.getTime());
  if(idx>=0)document.getElementById('gRight').scrollLeft=Math.max(0,idx*DAY_W-120);
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal').classList.remove('hidden');
  if(id){
    const t=tasks.find(x=>x.id===id);if(!t)return;
    document.getElementById('mTitle').textContent='案件を編集';
    document.getElementById('fName').value=t.name;
    document.getElementById('fNum').value=t.num||'';
    document.getElementById('fOwner').value=t.owner||'';
    document.getElementById('fStart').value=t.start;
    document.getElementById('fEnd').value=t.end;
    document.getElementById('fStatus').value=t.status;
    document.getElementById('fProg').value=t.prog;
    document.getElementById('fProgVal').textContent=t.prog+'%';
    document.getElementById('fNote').value=t.note||'';
  }else{
    document.getElementById('mTitle').textContent='案件を追加';
    ['fName','fNum','fOwner','fNote'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fStart').value=new Date().toISOString().slice(0,10);
    document.getElementById('fEnd').value='';
    document.getElementById('fStatus').value='未着手';
    document.getElementById('fProg').value=0;
    document.getElementById('fProgVal').textContent='0%';
  }
  document.getElementById('fName').focus();
}

function closeModal(){document.getElementById('modal').classList.add('hidden');editId=null;}

function saveTask(){
  const name=document.getElementById('fName').value.trim();
  const start=document.getElementById('fStart').value,end=document.getElementById('fEnd').value;
  if(!name){alert('案件名を入力してください');return;}
  if(!start){alert('開始日を入力してください');return;}
  if(!end){alert('納期を入力してください');return;}
  if(start>end){alert('納期は開始日以降に設定してください');return;}
  const d={name,num:document.getElementById('fNum').value.trim(),owner:document.getElementById('fOwner').value.trim(),start,end,status:document.getElementById('fStatus').value,prog:parseInt(document.getElementById('fProg').value),note:document.getElementById('fNote').value.trim()};
  if(editId){const i=tasks.findIndex(t=>t.id===editId);if(i>=0)tasks[i]={...tasks[i],...d};}
  else{d.id=Date.now();tasks.push(d);}
  save();closeModal();render();
}

function delTask(e,id){
  e.stopPropagation();
  if(!confirm('この案件を削除しますか？'))return;
  tasks=tasks.filter(t=>t.id!==id);save();render();
}

function showTip(e,id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const tip=document.getElementById('tip');
  tip.classList.remove('hidden');
  document.getElementById('ttName').textContent=t.name;
  document.getElementById('ttNum').textContent=t.num?'品番: '+t.num:'';
  document.getElementById('ttDates').textContent='期間: '+t.start+' 〜 '+t.end;
  document.getElementById('ttOwner').textContent=t.owner?'担当: '+t.owner:'';
  document.getElementById('ttProg').textContent='ステータス: '+t.status+'  進捗: '+t.prog+'%';
  document.getElementById('ttNote').textContent=t.note?'備考: '+t.note:'';
}

function hideTip(){document.getElementById('tip').classList.add('hidden');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
